name: Deploy to server

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger git pull on hosting
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Error: add DEPLOY_TOKEN in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi

          URL="${DEPLOY_URL:-https://identity.xsdk.ru/github-pull.php}"
          echo "Calling $URL"

          response=$(curl -sS -w "\nHTTP_CODE:%{http_code}" -X POST \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            "$URL")

          echo "$response"

          code=$(echo "$response" | grep HTTP_CODE | cut -d: -f2)
          if [ "$code" != "200" ]; then
            echo "Deploy failed with HTTP $code"
            exit 1
          fi

          echo "Deploy OK"
